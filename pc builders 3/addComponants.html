<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Component - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            border: 1px solid #334155;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #334155;
        }

        .tab-btn {
            padding: 12px 20px;
            background: transparent;
            color: #94a3b8;
            border: none;
            cursor: pointer;
            font-size: 15px;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }

        .tab-btn.active {
            color: #38bdf8;
            border-bottom-color: #38bdf8;
        }

        .tab-btn:hover {
            color: #cbd5e1;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 14px;
            transition: 0.2s;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
            background: #1e293b;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit {
            background: #3b82f6;
            color: white;
        }

        .btn-submit:hover {
            background: #2563eb;
        }

        .btn-reset {
            background: #64748b;
            color: white;
        }

        .btn-reset:hover {
            background: #475569;
        }

        .btn-back {
            background: #ef4444;
            color: white;
        }

        .btn-back:hover {
            background: #dc2626;
        }

        .success-message {
            background: #10b981;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #ef4444;
            color: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        /* Search and Suggestions */
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-top: none;
            border-radius: 0 0 6px 6px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 100;
        }

        .suggestions.show {
            display: block;
        }

        .suggestion-item {
            padding: 12px;
            color: #e2e8f0;
            cursor: pointer;
            border-bottom: 1px solid #334155;
            transition: 0.2s;
        }

        .suggestion-item:hover {
            background: #1e293b;
            color: #38bdf8;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .popular-components {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .popular-card {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .popular-card:hover {
            border-color: #38bdf8;
            background: #1e293b;
        }

        .popular-card h4 {
            color: #38bdf8;
            margin-bottom: 5px;
            font-size: 13px;
        }

        .popular-card p {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .popular-price {
            color: #10b981;
            font-weight: bold;
        }

        .components-list {
            margin-top: 40px;
            border-top: 1px solid #334155;
            padding-top: 30px;
        }

        .components-list h2 {
            color: #38bdf8;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .component-card {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .component-info h4 {
            color: #e2e8f0;
            margin-bottom: 5px;
        }

        .component-info p {
            color: #94a3b8;
            font-size: 12px;
            margin-bottom: 3px;
        }

        .component-price {
            color: #38bdf8;
            font-weight: bold;
            font-size: 18px;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .category-section {
            margin-bottom: 30px;
        }

        .category-title {
            color: #cbd5e1;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }

        .info-box {
            background: #0f172a;
            border-left: 3px solid #38bdf8;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .info-box p {
            color: #cbd5e1;
            font-size: 13px;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Component Manager</h1>
        <p class="subtitle">Add or manage PC components for your builder</p>

        <div class="success-message" id="successMsg"></div>
        <div class="error-message" id="errorMsg"></div>

        <!-- Tabs -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('search')">🔍 Search & Add</button>
            <button class="tab-btn" onclick="switchTab('manual')">✍️ Manual Entry</button>
            <button class="tab-btn" onclick="switchTab('list')">📦 All Components</button>
        </div>

        <!-- TAB 1: Search & Add -->
        <div id="search" class="tab-content active">
            <div class="info-box">
                <p>💡 Type a component name to search popular components, or create a custom one!</p>
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="search-category" required>
                    <option value="">Select Category</option>
                    <option value="CPU">CPU</option>
                    <option value="GPU">GPU</option>
                    <option value="RAM">RAM</option>
                    <option value="Storage">Storage</option>
                    <option value="PSU">PSU</option>
                    <option value="Cooler">Cooler</option>
                </select>
            </div>

            <div class="form-group search-container">
                <label for="search-input">Component Name *</label>
                <input 
                    type="text" 
                    id="search-input" 
                    class="search-input" 
                    placeholder="Type to search (e.g., 'RTX 4070', 'i7-13700K')"
                >
                <div class="suggestions" id="suggestions"></div>
            </div>

            <div class="form-group">
                <label for="search-specs">Specifications *</label>
                <textarea id="search-specs" placeholder="e.g., 12GB GDDR6X, 575W TDP"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="search-price">Price ($) *</label>
                    <input type="number" id="search-price" placeholder="799" min="0" step="0.01" required>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn-submit" onclick="addFromSearch()">➕ Add Component</button>
                <button type="button" class="btn-reset" onclick="clearSearchForm()">🔄 Clear</button>
                <button type="button" class="btn-back" onclick="window.location.href='buildPC.html'">← Back</button>
            </div>

            <h3 style="color: #38bdf8; margin-top: 30px; margin-bottom: 15px;">🌟 Popular Components</h3>
            <div class="popular-components" id="popularComponents"></div>
        </div>

        <!-- TAB 2: Manual Entry -->
        <div id="manual" class="tab-content">
            <div class="info-box">
                <p>📝 Manually add a new component with all details.</p>
            </div>

            <form id="componentForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="CPU">CPU</option>
                            <option value="GPU">GPU</option>
                            <option value="RAM">RAM</option>
                            <option value="Storage">Storage</option>
                            <option value="PSU">PSU</option>
                            <option value="Cooler">Cooler</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="price">Price ($) *</label>
                        <input type="number" id="price" placeholder="249" min="0" step="0.01" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="name">Component Name *</label>
                    <input type="text" id="name" placeholder="e.g., Intel Core i7-13700K" required>
                </div>

                <div class="form-group">
                    <label for="specs">Specifications *</label>
                    <textarea id="specs" placeholder="e.g., 13th Gen, 16 Cores, 3.2GHz"></textarea>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-submit">➕ Add Component</button>
                    <button type="reset" class="btn-reset">🔄 Clear</button>
                    <button type="button" class="btn-back" onclick="window.location.href='buildPC.html'">← Back</button>
                </div>
            </form>
        </div>

        <!-- TAB 3: All Components -->
        <div id="list" class="tab-content">
            <div class="components-list" id="componentsList"></div>
        </div>
    </div>

    <script>
        // Popular components database
        const popularDatabase = {
            CPU: [
                { name: 'Intel Core i5-13600K', specs: '13th Gen, 14 Cores, 3.5GHz', price: 289 },
                { name: 'Intel Core i7-13700K', specs: '13th Gen, 16 Cores, 3.4GHz', price: 389 },
                { name: 'Intel Core i9-13900K', specs: '13th Gen, 24 Cores, 3.0GHz', price: 589 },
                { name: 'AMD Ryzen 5 5600X', specs: '6 Cores, 3.7GHz', price: 199 },
                { name: 'AMD Ryzen 7 7700X', specs: '8 Cores, 4.5GHz', price: 299 },
                { name: 'AMD Ryzen 9 7950X', specs: '16 Cores, 4.5GHz', price: 549 }
            ],
            GPU: [
                { name: 'NVIDIA RTX 4060 Ti', specs: '8GB GDDR6, 575W TDP', price: 499 },
                { name: 'NVIDIA RTX 4070', specs: '12GB GDDR6X, 200W TDP', price: 799 },
                { name: 'NVIDIA RTX 4080', specs: '16GB GDDR6X, 320W TDP', price: 1199 },
                { name: 'AMD RX 6700 XT', specs: '12GB GDDR6, 250W TDP', price: 379 },
                { name: 'AMD RX 6900 XT', specs: '16GB GDDR6, 405W TDP', price: 649 }
            ],
            RAM: [
                { name: 'Corsair Vengeance RGB Pro 32GB', specs: 'DDR5, 5600MHz', price: 149 },
                { name: 'G.Skill Trident Z5 32GB', specs: 'DDR5, 6000MHz', price: 159 },
                { name: 'Kingston Fury Beast 32GB', specs: 'DDR5, 5600MHz', price: 129 },
                { name: 'Team Dark Z 64GB', specs: 'DDR5, 7200MHz', price: 299 }
            ],
            Storage: [
                { name: 'Samsung 870 QVO 1TB', specs: 'SSD, 560MB/s', price: 79 },
                { name: 'WD Blue SN580 1TB', specs: 'NVMe, 4150MB/s', price: 89 },
                { name: 'Crucial P5 Plus 1TB', specs: 'NVMe, 6600MB/s', price: 99 },
                { name: 'Samsung 990 Pro 2TB', specs: 'NVMe, 7100MB/s', price: 199 }
            ],
            PSU: [
                { name: 'Corsair RM850x 850W', specs: '80+ Gold, Modular', price: 129 },
                { name: 'EVGA SuperNOVA 750G2', specs: '80+ Gold, 750W', price: 99 },
                { name: 'Seasonic Focus 650W', specs: '80+ Gold, 650W', price: 89 },
                { name: 'Corsair HX1200i 1200W', specs: '80+ Platinum, 1200W', price: 249 }
            ],
            Cooler: [
                { name: 'Noctua NH-D15', specs: 'Air Cooler, 150mm', price: 99 },
                { name: 'ASUS ROG STRIX LC 360', specs: 'Liquid Cooler, 360mm', price: 179 },
                { name: 'be quiet! Dark Rock Pro 4', specs: 'Air Cooler, 135mm', price: 89 },
                { name: 'NZXT Kraken X63', specs: 'Liquid Cooler, 280mm', price: 149 }
            ]
        };

        // Load components from localStorage
        function loadComponents() {
            const stored = localStorage.getItem('pcComponents');
            if (stored) {
                return JSON.parse(stored);
            }
            
            // Initialize with default components
            const defaultComponents = {};
            Object.keys(popularDatabase).forEach(category => {
                defaultComponents[category] = [...popularDatabase[category]];
            });
            saveComponents(defaultComponents);
            return defaultComponents;
        }

        // Save components to localStorage
        function saveComponents(components) {
            localStorage.setItem('pcComponents', JSON.stringify(components));
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'list') {
                renderComponents();
            }
        }

        // Search functionality
        let searchTimeout;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.toLowerCase();
            const category = document.getElementById('search-category').value;

            if (query.length < 1 || !category) {
                document.getElementById('suggestions').classList.remove('show');
                return;
            }

            searchTimeout = setTimeout(() => {
                const suggestions = popularDatabase[category]
                    .filter(comp => comp.name.toLowerCase().includes(query))
                    .slice(0, 5);

                const suggestionsDiv = document.getElementById('suggestions');
                suggestionsDiv.innerHTML = '';

                if (suggestions.length > 0) {
                    suggestions.forEach(comp => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerHTML = `<strong>${comp.name}</strong><br><small>$${comp.price} - ${comp.specs}</small>`;
                        div.addEventListener('click', () => {
                            selectSuggestion(comp);
                        });
                        suggestionsDiv.appendChild(div);
                    });
                    suggestionsDiv.classList.add('show');
                } else {
                    suggestionsDiv.classList.remove('show');
                }
            }, 300);
        });

        // Select suggestion
        function selectSuggestion(comp) {
            document.getElementById('search-input').value = comp.name;
            document.getElementById('search-specs').value = comp.specs;
            document.getElementById('search-price').value = comp.price;
            document.getElementById('suggestions').classList.remove('show');
        }

        // Render popular components
        function renderPopularComponents() {
            const category = document.getElementById('search-category').value;
            const container = document.getElementById('popularComponents');
            container.innerHTML = '';

            if (!category) {
                container.innerHTML = '<p style="color: #94a3b8; grid-column: 1/-1;">Select a category first</p>';
                return;
            }

            const popular = popularDatabase[category] || [];
            popular.slice(0, 4).forEach(comp => {
                const card = document.createElement('div');
                card.className = 'popular-card';
                card.innerHTML = `
                    <h4>${comp.name}</h4>
                    <p>${comp.specs}</p>
                    <div class="popular-price">$${comp.price}</div>
                `;
                card.addEventListener('click', () => selectSuggestion(comp));
                container.appendChild(card);
            });
        }

        document.getElementById('search-category').addEventListener('change', renderPopularComponents);

        // ========== DATABASE এ পাঠানোর CODE (UPDATED) ==========
        // Add from search
        function addFromSearch() {
            const category = document.getElementById('search-category').value;
            const name = document.getElementById('search-input').value;
            const specs = document.getElementById('search-specs').value;
            const price = parseFloat(document.getElementById('search-price').value);

            if (!category || !name || !specs || !price) {
                showError('সব ফিল্ড ভরো!');
                return;
            }

            // DATABASE এ পাঠাও
            fetch('addComponent.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    category: category,
                    name: name,
                    specs: specs,
                    price: price
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Response:', data);
                if (data.success) {
                    showSuccess('✅ Database এ যোগ হয়েছে!');
                    clearSearchForm();
                } else {
                    showError('❌ Error: ' + data.message);
                }
            })
            .catch(error => {
                showError('❌ Server Error!');
                console.error('Fetch error:', error);
            });
        }

        // Clear search form
        function clearSearchForm() {
            document.getElementById('search-input').value = '';
            document.getElementById('search-specs').value = '';
            document.getElementById('search-price').value = '';
        }

        // ========== DATABASE এ পাঠানোর CODE (UPDATED) ==========
        // Manual form submit
        document.getElementById('componentForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const category = document.getElementById('category').value;
            const name = document.getElementById('name').value;
            const specs = document.getElementById('specs').value;
            const price = parseFloat(document.getElementById('price').value);

            if (!category || !name || !specs || !price) {
                showError('সব ফিল্ড ভরো!');
                return;
            }

            // DATABASE এ পাঠাও
            fetch('addComponent.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    category: category,
                    name: name,
                    specs: specs,
                    price: price
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Response:', data);
                if (data.success) {
                    showSuccess('✅ Database এ যোগ হয়েছে!');
                    document.getElementById('componentForm').reset();
                } else {
                    showError('❌ Error: ' + data.message);
                }
            })
            .catch(error => {
                showError('❌ Server Error!');
                console.error('Fetch error:', error);
            });
        });

        // Render all components
        function renderComponents() {
            const components = loadComponents();
            const container = document.getElementById('componentsList');
            container.innerHTML = '<h2>📦 All Components</h2>';

            Object.keys(components).forEach(category => {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<div class="category-title">🏷️ ${category} (${components[category].length})</div>`;

                components[category].forEach((comp, index) => {
                    const card = document.createElement('div');
                    card.className = 'component-card';
                    card.innerHTML = `
                        <div class="component-info">
                            <h4>${comp.name}</h4>
                            <p>${comp.specs}</p>
                        </div>
                        <div style="text-align: right;">
                            <div class="component-price">$${comp.price}</div>
                            <button class="delete-btn" onclick="deleteComponent('${category}', ${index})">Delete</button>
                        </div>
                    `;
                    section.appendChild(card);
                });

                container.appendChild(section);
            });
        }

        // Delete component
        function deleteComponent(category, index) {
            if (confirm('Delete this component?')) {
                const components = loadComponents();
                components[category].splice(index, 1);
                saveComponents(components);
                renderComponents();
                showSuccess('✅ Component deleted!');
            }
        }

        // Show messages
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
