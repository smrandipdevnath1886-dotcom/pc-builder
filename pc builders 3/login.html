<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PC Builder</title>
</head>
<body style="margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; background-color: rgba(16, 23, 42, 1); min-height: 100vh; font-family: Arial, sans-serif;">

    <div style="width: 100%; max-width: 500px; padding: 20px;">
        <form action="login-val.php" method="POST" style="display: flex; flex-direction: column; padding: 50px; gap: 15px; border-radius: 10px; background-color: #333741; border: none;">
            
            <h2 style="color: white; text-align: center; margin: 0 0 30px 0;">Login to PC Builder</h2>
            
            <label style="color: white; font-weight: bold;">Email</label>
            <input type="email" name="email" placeholder="Enter your email" required style="height: 45px; padding: 10px; border: none; border-radius: 5px; font-size: 16px;">
            
            <label style="color: white; font-weight: bold;">Password</label>
            <input type="password" name="password" placeholder="Enter your password" required style="height: 45px; padding: 10px; border: none; border-radius: 5px; font-size: 16px;">
            
            <button type="submit" style="padding: 12px; background-color: #9b6cff; border: none; color: white; font-weight: bold; font-size: 1rem; border-radius: 6px; cursor: pointer; margin-top: 20px;">Login</button>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="#" style="color: #9b6cff; text-decoration: none; font-weight: bold;">Forgot Password?</a>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="signup.html" style="display: inline-block; background-color: rgba(0, 18, 181, 1); color: white; padding: 12px 30px; border-radius: 5px; text-decoration: none; font-weight: bold;">Create New Account</a>
            </div>
        </form>
    </div>
